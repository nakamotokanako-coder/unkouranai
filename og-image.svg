<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="50%" stop-color="#ffea00"/>
      <stop offset="100%" stop-color="#ff6ef7"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="poopGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 装飾の小さな星 -->
  <circle cx="120" cy="80" r="2" fill="#ffea00" opacity="0.6"/>
  <circle cx="1080" cy="120" r="2" fill="#00ffcc" opacity="0.6"/>
  <circle cx="160" cy="540" r="2" fill="#ff6ef7" opacity="0.5"/>
  <circle cx="1050" cy="510" r="2" fill="#ffea00" opacity="0.6"/>
  <circle cx="60" cy="320" r="1.5" fill="#00ffcc" opacity="0.5"/>
  <circle cx="1140" cy="340" r="1.5" fill="#ff6ef7" opacity="0.5"/>

  <!-- 左側：ネオンうんこシルエット -->
  <g transform="translate(280, 315)" filter="url(#poopGlow)">
    <!-- うんこの3段シルエット（シンプル化） -->
    <path d="M 0,80 
             C -50,80 -70,40 -50,20 
             C -70,10 -65,-15 -45,-20 
             C -55,-35 -45,-55 -25,-55 
             C -25,-75 -10,-90 5,-90 
             C 20,-90 35,-75 35,-55 
             C 55,-55 65,-35 55,-20 
             C 75,-15 80,10 60,20 
             C 80,40 60,80 10,80 Z"
          fill="none"
          stroke="#00ffcc"
          stroke-width="3"
          stroke-linejoin="round"/>
    <path d="M 0,80 
             C -50,80 -70,40 -50,20 
             C -70,10 -65,-15 -45,-20 
             C -55,-35 -45,-55 -25,-55 
             C -25,-75 -10,-90 5,-90 
             C 20,-90 35,-75 35,-55 
             C 55,-55 65,-35 55,-20 
             C 75,-15 80,10 60,20 
             C 80,40 60,80 10,80 Z"
          fill="rgba(0,255,204,0.05)"/>
    <!-- 目 -->
    <circle cx="-15" cy="-25" r="4" fill="#000"/>
    <circle cx="25" cy="-25" r="4" fill="#000"/>
    <!-- 口 -->
    <path d="M -8,-5 Q 5,5 18,-5" stroke="#000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 浮かぶ小さなうんこ絵文字風 -->
  <text x="180" y="200" font-size="44" opacity="0.5" filter="url(#glow)" fill="#ffea00">💩</text>
  <text x="380" y="160" font-size="32" opacity="0.4" filter="url(#glow)" fill="#ff6ef7">💩</text>
  <text x="220" y="480" font-size="36" opacity="0.4" filter="url(#glow)" fill="#00ffcc">💩</text>

  <!-- 右側：テキスト -->
  <g transform="translate(540, 0)">
    <!-- タイトル -->
    <text x="0" y="240" font-family="'Kaisei Decol', 'Hiragino Mincho ProN', serif" font-size="76" font-weight="700" fill="url(#textGrad)" filter="url(#glow)">
      うんこ占い
    </text>
    <text x="0" y="295" font-family="'Kaisei Decol', serif" font-size="28" font-weight="700" fill="#ffffff" opacity="0.9">
      .com / Unko Oracle
    </text>

    <!-- 区切り線 -->
    <line x1="0" y1="335" x2="120" y2="335" stroke="#00ffcc" stroke-width="2"/>

    <!-- サブタイトル -->
    <text x="0" y="385" font-family="'Zen Maru Gothic', sans-serif" font-size="26" font-weight="500" fill="#ffffff">
      生年月日で診断する、
    </text>
    <text x="0" y="425" font-family="'Zen Maru Gothic', sans-serif" font-size="26" font-weight="500" fill="#ffffff">
      あなたの便器界キャラクター
    </text>

    <!-- キャッチコピー -->
    <text x="0" y="490" font-family="'Zen Maru Gothic', sans-serif" font-size="20" fill="rgba(255,234,0,0.9)">
      詰まりを笑って流し、心を軽くする占い
    </text>

    <!-- 特徴タグ -->
    <g transform="translate(0, 530)">
      <rect x="0" y="0" width="120" height="34" rx="17" fill="none" stroke="rgba(0,255,204,0.6)" stroke-width="1.5"/>
      <text x="60" y="22" font-family="'Zen Maru Gothic', sans-serif" font-size="14" fill="#00ffcc" text-anchor="middle">12キャラ図鑑</text>

      <rect x="135" y="0" width="100" height="34" rx="17" fill="none" stroke="rgba(255,234,0,0.6)" stroke-width="1.5"/>
      <text x="185" y="22" font-family="'Zen Maru Gothic', sans-serif" font-size="14" fill="#ffea00" text-anchor="middle">相性占い</text>

      <rect x="250" y="0" width="100" height="34" rx="17" fill="none" stroke="rgba(255,110,247,0.6)" stroke-width="1.5"/>
      <text x="300" y="22" font-family="'Zen Maru Gothic', sans-serif" font-size="14" fill="#ff6ef7" text-anchor="middle">月のうん勢</text>
    </g>
  </g>

  <!-- 左下のドメイン -->
  <text x="60" y="600" font-family="'Zen Maru Gothic', sans-serif" font-size="16" fill="rgba(255,255,255,0.4)" letter-spacing="2">
    unkouranai.com
  </text>
</svg>
